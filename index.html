<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clayton's Weather Radar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body { margin:0; height:100%; }
#map { width:100%; height:100%; }

/* Controls */
#controls {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.75);
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  z-index:1000;
  flex-wrap:wrap;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

input[type="range"] { width:140px; }

#timeLabel {
  color:white;
  font-weight:bold;
}

/* Side Panel */
#panel {
  position:absolute;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  color:white;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:2000;
  overflow-y:auto;
}

#panel.open {
  transform:translateX(0);
}

#closePanel {
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
  margin-bottom:10px;
}

label { color:white; }
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
  <button id="playBtn">▶</button>
  <input type="range" id="slider" min="0" max="0" value="0">
  <span id="timeLabel"></span>

  <label>
    <input type="checkbox" id="alertsToggle" checked> Alerts
  </label>
</div>

<div id="panel">
  <button id="closePanel">Close</button>
  <div id="panelContent">Click an alert</div>
</div>

<script>
/* ---------------- MAP ---------------- */
const map = L.map('map', {
  zoomSnap:0.25,
  zoomDelta:0.5,
  preferCanvas:true,
  maxZoom:18
}).setView([29.5,-95],6);

/* Basemap */
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd',
  maxZoom:19
}).addTo(map);

/* ---------------- NOAA BASE RADAR ---------------- */
const baseRadar = L.tileLayer.wms(
  "https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/ows?",
  {
    layers: "conus_bref_qcd",
    format: "image/png",
    transparent: true,
    opacity: 0.5
  }
).addTo(map);

/* ---------------- ANIMATION (RAINVIEWER) ---------------- */
let frames = [];
let layers = [];
let index = 0;
let timer = null;

const slider = document.getElementById("slider");
const label = document.getElementById("timeLabel");
const playBtn = document.getElementById("playBtn");

async function loadAnimation(){
  const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
  const data = await res.json();

  const host = data.host;

  frames = [...data.radar.past, ...data.radar.nowcast].slice(-6);

  layers.forEach(l => map.removeLayer(l));
  layers = [];

  frames.forEach((f,i)=>{
    const layer = L.tileLayer(
      `${host}${f.path}/256/{z}/{x}/{y}/2/1_1.png`,
      {
        opacity: i===0 ? 0.6 : 0,
        maxNativeZoom: 8,
        maxZoom: 18
      }
    ).addTo(map);

    layers.push(layer);
  });

  slider.max = layers.length - 1;
  updateLabel(0);
}

function updateLabel(i){
  const t = new Date(frames[i].time * 1000);
  label.textContent = t.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
}

function showFrame(i){
  if(!layers.length) return;

  layers[index].setOpacity(0);
  index = i;
  layers[index].setOpacity(0.6);
  slider.value = i;
  updateLabel(i);
}

/* ▶ Animation */
playBtn.onclick = ()=>{
  if(timer){
    clearInterval(timer);
    timer = null;
    playBtn.textContent = "▶";
  } else {
    timer = setInterval(()=>{
      showFrame((index+1) % layers.length);
    }, 500);
    playBtn.textContent = "⏸";
  }
};

slider.oninput = e => showFrame(+e.target.value);

loadAnimation();

/* ---------------- ALERT PANEL ---------------- */
const panel = document.getElementById("panel");
const content = document.getElementById("panelContent");

document.getElementById("closePanel").onclick = ()=>{
  panel.classList.remove("open");
};

/* ---------------- ALERTS ---------------- */
let alertsLayer = L.layerGroup();

function getColor(event){
  if(!event) return "#ff0000";
  if(event.includes("Tornado")) return "#ff0000";
  if(event.includes("Severe Thunderstorm")) return "#ff9900";
  if(event.includes("Flash Flood")) return "#00e5ff";
  if(event.includes("Flood")) return "#00bfff";
  return "#ffcc00";
}

fetch("https://api.weather.gov/alerts/active")
.then(r=>r.json())
.then(data=>{
  const geo = L.geoJSON(data,{
    style:f=>({
      color:getColor(f.properties.event),
      weight:2,
      fillOpacity:0.25
    }),

    onEachFeature:(f,layer)=>{
      layer.on("click", ()=>{
        const p = f.properties;

        content.innerHTML = `
          <h2>${p.event}</h2>
          <b>Area:</b> ${p.areaDesc}<br><br>
          <b>Severity:</b> ${p.severity || "N/A"}<br><br>
          <b>Headline:</b><br>${p.headline || ""}<br><br>
          <b>Details:</b><br>${p.description || ""}
        `;

        panel.classList.add("open");
      });
    }
  });

  alertsLayer.addLayer(geo);
  alertsLayer.addTo(map);
});

document.getElementById("alertsToggle").onchange = e=>{
  e.target.checked ? alertsLayer.addTo(map) : map.removeLayer(alertsLayer);
};
</script>

</body>
</html>
