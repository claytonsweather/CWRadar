<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clayton's Weather – Radar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}
#map {
  width: 100%;
  height: 100%;
  background: #cfe9f7;
}

#branding {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1100;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  font-weight: bold;
}

#controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
  z-index: 1000;
  flex-wrap: wrap;
  gap: 10px;
}

button {
  padding: 6px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

input[type="range"] {
  width: 160px;
}

#timeLabel {
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="branding">Clayton's Weather Radar</div>
<div id="map"></div>

<div id="controls">
  <button id="playBtn">▶</button>
  <input type="range" id="slider" min="0" max="0" value="0">
  <span id="timeLabel"></span>

  <label style="color:white;">
    <input type="checkbox" id="alertsToggle" checked> Alerts
  </label>

  <button id="texasBtn">Texas</button>
</div>

<script>
/* ---------------- MAP ---------------- */
const map = L.map('map', {
  zoomSnap: 0.25,
  zoomDelta: 0.5,
  preferCanvas: true
}).setView([29.5, -95], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

/* ---------------- RADAR ---------------- */
let frames = [];
let layers = [];
let index = 0;
let playing = false;
let timer = null;

const slider = document.getElementById("slider");
const label = document.getElementById("timeLabel");
const playBtn = document.getElementById("playBtn");

async function loadRadar() {
  const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
  const data = await res.json();

  const host = data.host;

  // ✅ Use both past + nowcast
  frames = [...data.radar.past, ...data.radar.nowcast].slice(-8);

  // clear old layers
  layers.forEach(l => map.removeLayer(l));
  layers = [];

  frames.forEach((frame, i) => {
    const layer = L.tileLayer(
      `${host}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
      {
        opacity: i === 0 ? 0.7 : 0,
        tileSize: 256,
        crossOrigin: true
      }
    ).addTo(map);

    layers.push(layer);
  });

  slider.max = layers.length - 1;
  updateTimeLabel(0);
}

function updateTimeLabel(i) {
  if (!frames[i]) return;
  const t = new Date(frames[i].time * 1000);
  label.textContent = t.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

function showFrame(i) {
  if (!layers.length) return;

  layers[index].setOpacity(0);
  index = i;
  layers[index].setOpacity(0.7);

  slider.value = i;
  updateTimeLabel(i);
}

/* Animation */
playBtn.onclick = () => {
  playing = !playing;

  if (playing) {
    timer = setInterval(() => {
      showFrame((index + 1) % layers.length);
    }, 600);
    playBtn.textContent = "⏸";
  } else {
    clearInterval(timer);
    playBtn.textContent = "▶";
  }
};

/* Slider */
slider.oninput = e => {
  clearInterval(timer);
  playing = false;
  playBtn.textContent = "▶";
  showFrame(+e.target.value);
};

/* Stop animation on interaction (prevents crash) */
map.on("zoomstart movestart", () => {
  clearInterval(timer);
  playing = false;
  playBtn.textContent = "▶";
});

loadRadar();

/* ---------------- NWS ALERTS ---------------- */
let alertsLayer = L.layerGroup();

fetch("https://api.weather.gov/alerts/active")
  .then(r => r.json())
  .then(data => {
    const geo = L.geoJSON(data, {
      style: {
        color: "#ff0000",
        weight: 2,
        fillOpacity: 0.2
      },
      onEachFeature: (f, l) => {
        l.bindPopup(`<b>${f.properties.event}</b><br>${f.properties.areaDesc}`);
      }
    });

    alertsLayer.addLayer(geo);

    // ✅ Show by default
    alertsLayer.addTo(map);
  });

document.getElementById("alertsToggle").onchange = e => {
  if (e.target.checked) {
    alertsLayer.addTo(map);
  } else {
    map.removeLayer(alertsLayer);
  }
};

/* ---------------- TEXAS BUTTON ---------------- */
document.getElementById("texasBtn").onclick = () => {
  map.setView([31, -99], 6);
};
</script>

</body>
</html>
